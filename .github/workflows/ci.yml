name: CI - JARVIS API

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: jarvis_test
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: jarvis123
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U jarvis -d jarvis_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://jarvis:jarvis123@localhost:5432/jarvis_test
      GEMMA_BASE_URL: https://llm.liaufms.org/v1/gemma-3-12b-it
      GEMMA_MODEL: google/gemma-3-12b-it
      GEMMA_API_KEY: fake-key-for-tests
      APP_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Build Docker image
        run: docker build -t jarvis-academico-api .